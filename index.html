<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Minha Coleção Magic</title>
  <meta name="description" content="Gere a tua coleção de Magic: The Gathering — guardada numa base de dados na nuvem." />
  <link rel="preconnect" href="https://api.scryfall.com" />
  <link rel="preconnect" href="https://cards.scryfall.io" />
  <!-- Firebase / Google (SDK, Firestore e login) — poupa o handshake inicial -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://apis.google.com" />
  <link rel="preconnect" href="https://accounts.google.com" />
  <link rel="stylesheet" href="styles.css?v=16" />
  <link rel="icon" type="image/svg+xml" href="icon.svg?v=16" />
  <link rel="alternate icon" href="icon.png?v=16" />
  <link rel="apple-touch-icon" href="icon.png?v=16" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <h1 class="brand"><img class="brand-icon" src="icon.svg?v=16" alt="" /> A Minha Coleção <span>Magic</span></h1>
      <nav class="tabs" role="tablist">
        <button class="tab" data-view="editions" role="tab">Sets</button>
        <button class="tab active" data-view="collection" role="tab">Coleção</button>
      </nav>
      <div id="auth-area" class="auth-area"></div>
    </div>
  </header>

  <main class="container">
    <!-- ===== VISTA: EDIÇÕES ===== -->
    <section id="view-editions" class="view">
      <!-- Seletor de edições (grelha de símbolos) -->
      <div id="edition-picker">
        <p class="hint">Escolhe um set pelo símbolo. A percentagem indica quantas cartas desse set já tens.</p>
        <input id="edition-search" type="search" placeholder="Filtrar sets…" aria-label="Filtrar sets" />
        <div id="edition-sets" class="set-grid"></div>
      </div>

      <!-- Detalhe da edição escolhida -->
      <div id="edition-detail" hidden>
        <div class="edition-detail-bar">
          <button id="edition-back" class="btn btn-sm">← Todos os sets</button>
          <label class="check-inline">
            <input type="checkbox" id="edition-missing-only" />
            Mostrar apenas as que faltam
          </label>
          <select id="edition-rarity" class="rarity-filter" aria-label="Filtrar por raridade">
            <option value="">Todas as raridades</option>
            <option value="common">Comum</option>
            <option value="uncommon">Incomum</option>
            <option value="rare">Rara</option>
            <option value="mythic">Mítica</option>
          </select>
        </div>
        <h2 id="edition-title" class="edition-title"></h2>
        <div id="edition-stats" class="stats"></div>
        <div id="edition-grid" class="card-grid"></div>
      </div>

      <div id="edition-status" class="status" aria-live="polite"></div>
    </section>

    <!-- ===== VISTA: COLEÇÃO ===== -->
    <section id="view-collection" class="view active">
      <div id="collection-stats" class="stats"></div>

      <div class="collection-toolbar">
        <input id="collection-filter" type="search" placeholder="Filtrar na coleção…" aria-label="Filtrar coleção" />
        <select id="collection-sort" aria-label="Ordenar">
          <option value="name">Nome (A→Z)</option>
          <option value="name-desc">Nome (Z→A)</option>
          <option value="value-desc">Valor (maior)</option>
          <option value="value">Valor (menor)</option>
          <option value="number">Nº do set (1→∞)</option>
          <option value="number-desc">Nº do set (∞→1)</option>
          <option value="recent">Adicionadas recentemente</option>
        </select>
        <select id="collection-rarity" aria-label="Filtrar por raridade">
          <option value="">Todas as raridades</option>
          <option value="common">Comum</option>
          <option value="uncommon">Incomum</option>
          <option value="rare">Rara</option>
          <option value="mythic">Mítica</option>
        </select>
        <div class="spacer"></div>
        <button id="export-btn" class="btn">Exportar</button>
        <button id="import-btn" class="btn">Importar JSON</button>
        <button id="import-csv-btn" class="btn">Importar CSV (Moxfield)</button>
        <button id="clear-btn" class="btn btn-danger">Apagar tudo</button>
        <input id="import-file" type="file" accept="application/json,.json" hidden />
        <input id="import-csv-file" type="file" accept="text/csv,.csv" hidden />
      </div>

      <div id="collection-status" class="status" aria-live="polite"></div>

      <!-- Grelha de edições que tens na coleção (símbolo + nome + %) -->
      <div id="collection-picker">
        <div id="collection-sets" class="set-grid"></div>
      </div>

      <!-- Detalhe: as tuas cartas de uma edição -->
      <div id="collection-detail" hidden>
        <div class="edition-detail-bar">
          <button id="collection-back" class="btn btn-sm">← Todos os sets</button>
          <label class="check-inline">
            <input type="checkbox" id="collection-show-missing" />
            Mostrar cartas em falta
          </label>
        </div>
        <h2 id="collection-set-title" class="edition-title"></h2>
        <div id="collection-set-stats" class="stats"></div>
        <div id="collection-grid" class="card-grid"></div>
      </div>
    </section>
  </main>

  <!-- Overlay de imagem grande -->
  <div id="preview" class="preview" hidden>
    <img id="preview-img" alt="Pré-visualização da carta" />
  </div>

  <!-- Porta de entrada: login obrigatório (a coleção vive na base de dados) -->
  <div id="auth-gate" class="auth-gate" hidden></div>

  <footer class="footer">
    <p>
      Dados e imagens via <a href="https://scryfall.com" target="_blank" rel="noopener">Scryfall</a>.
      A coleção fica guardada numa base de dados na nuvem — usa <strong>Exportar</strong> para um backup extra.
    </p>
  </footer>

  <script src="config.js?v=16"></script>
  <script src="app.js?v=16"></script>
  <script src="auth.js?v=16" type="module"></script>
</body>
</html>
