<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Minha Coleção Magic</title>
  <meta name="description" content="Gere a tua coleção de Magic: The Gathering — grátis, no browser." />
  <link rel="preconnect" href="https://api.scryfall.com" />
  <link rel="preconnect" href="https://cards.scryfall.io" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%83%8F%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <h1 class="brand">🃏 A Minha Coleção <span>Magic</span></h1>
      <nav class="tabs" role="tablist">
        <button class="tab active" data-view="search" role="tab">Procurar</button>
        <button class="tab" data-view="collection" role="tab">Coleção</button>
      </nav>
      <div id="auth-area" class="auth-area"></div>
    </div>
  </header>

  <main class="container">
    <!-- ===== VISTA: PROCURAR ===== -->
    <section id="view-search" class="view active">
      <form id="search-form" class="search-bar" autocomplete="off">
        <input
          id="search-input"
          type="search"
          placeholder="Procurar carta (ex.: Sol Ring, Lightning Bolt)…"
          aria-label="Procurar carta"
        />
        <button type="submit" class="btn btn-primary">Procurar</button>
      </form>
      <p class="hint">Suporta a sintaxe da Scryfall (ex.: <code>t:dragon</code>, <code>c:red cmc&lt;=3</code>, <code>set:mh3</code>).</p>
      <div id="search-status" class="status" aria-live="polite"></div>
      <div id="search-results" class="card-grid"></div>
      <div id="search-more" class="load-more"></div>
    </section>

    <!-- ===== VISTA: COLEÇÃO ===== -->
    <section id="view-collection" class="view">
      <div id="collection-stats" class="stats"></div>

      <div class="collection-toolbar">
        <input id="collection-filter" type="search" placeholder="Filtrar na coleção…" aria-label="Filtrar coleção" />
        <select id="collection-sort" aria-label="Ordenar">
          <option value="name">Nome (A→Z)</option>
          <option value="name-desc">Nome (Z→A)</option>
          <option value="value-desc">Valor (maior)</option>
          <option value="value">Valor (menor)</option>
          <option value="qty-desc">Quantidade (maior)</option>
          <option value="recent">Adicionadas recentemente</option>
        </select>
        <div class="spacer"></div>
        <button id="export-btn" class="btn">Exportar</button>
        <button id="import-btn" class="btn">Importar</button>
        <input id="import-file" type="file" accept="application/json,.json" hidden />
      </div>

      <div id="collection-status" class="status" aria-live="polite"></div>
      <div id="collection-grid" class="card-grid"></div>
    </section>
  </main>

  <!-- Overlay de imagem grande -->
  <div id="preview" class="preview" hidden>
    <img id="preview-img" alt="Pré-visualização da carta" />
  </div>

  <footer class="footer">
    <p>
      Dados e imagens via <a href="https://scryfall.com" target="_blank" rel="noopener">Scryfall</a>.
      A coleção fica guardada apenas neste browser — usa <strong>Exportar</strong> para fazer backup.
    </p>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script src="auth.js" type="module"></script>
</body>
</html>
